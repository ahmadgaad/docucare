name: Create PR to Development

on:
  push:
    branches:
      - 'features/*'
      - 'bugfix/*'
      - 'hotfix/*'
  
permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK for testing
      run: flutter build apk --debug --flavor development --target lib/main_development.dart

    - name: Capture app screenshots
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          echo "🚀 Starting screenshot capture process..."
          
          # Create screenshots directory
          mkdir -p screenshots
          
          # Find and install APK (simplified approach)
          APK_FILE=$(find build/app/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          
          echo "📦 Installing APK: $APK_FILE"
          adb install "$APK_FILE"
          
          # Get package name from gradle file (more reliable than pubspec)
          PACKAGE_NAME="com.example.$(basename $(pwd))"
          echo "📱 Package name: $PACKAGE_NAME"
          
          # Launch app
          echo "🔥 Launching app..."
          adb shell am start -n "${PACKAGE_NAME}/com.example.$(basename $(pwd)).MainActivity" || \
          adb shell am start -n "${PACKAGE_NAME}/.MainActivity"
          
          # Wait for app to load
          sleep 10
          
          # Capture screenshots
          echo "📸 Capturing screenshots..."
          for i in {1..3}; do
            echo "Taking screenshot $i..."
            adb exec-out screencap -p > "screenshots/screenshot_$i.png"
            
            # Add some interaction between screenshots
            if [ $i -lt 3 ]; then
              adb shell input tap 500 1000  # Tap center-ish of screen
              sleep 3
            fi
          done
          
          echo "✅ Screenshots captured successfully"
          ls -la screenshots/

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()  # Upload even if previous steps failed
      with:
        name: app-screenshots-${{ github.sha }}
        path: screenshots/
        retention-days: 30

    - name: Create or update Pull Request
      id: create_pr
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const headBranch = context.ref.replace('refs/heads/', '');
          const baseBranch = 'development';
          
          console.log(`🔍 Checking for existing PR: ${headBranch} → ${baseBranch}`);
          
          // Check for existing PR
          const { data: existingPRs } = await github.rest.pulls.list({
            owner,
            repo,
            head: `${owner}:${headBranch}`,
            base: baseBranch,
            state: 'open'
          });
          
          const workflowUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
          const screenshotArtifact = `app-screenshots-${context.sha}`;
          
          const prBody = `## 🔄 Automated Pull Request

          **Branch:** \`${headBranch}\` → \`${baseBranch}\`  
          **Author:** @${context.actor}  
          **Triggered by:** Push to ${headBranch}

          ### 📱 App Screenshots
          Screenshots have been automatically captured and are available as workflow artifacts:
          - **Artifact Name:** \`${screenshotArtifact}\`
          - **Download Link:** [View Workflow Run](${workflowUrl})

          ### ✅ Automated Checks
          - ✅ Flutter analyze passed
          - ✅ Tests passed  
          - ✅ APK build successful
          - ✅ Screenshots captured

          *This PR was automatically created. Please review and merge when ready.*`;

          if (existingPRs.length > 0) {
            // Update existing PR
            const pr = existingPRs[0];
            console.log(`📝 Updating existing PR #${pr.number}`);
            
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: prBody
            });
            
            core.setOutput('pr_created', 'false');
            core.setOutput('pr_updated', 'true');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_number', pr.number);
          } else {
            // Create new PR
            console.log(`✨ Creating new PR: ${headBranch} → ${baseBranch}`);
            
            const { data: newPR } = await github.rest.pulls.create({
              owner,
              repo,
              title: `🚀 ${headBranch} → ${baseBranch}`,
              head: headBranch,
              base: baseBranch,
              body: prBody
            });
            
            console.log(`🎉 PR created: ${newPR.html_url}`);
            core.setOutput('pr_created', 'true');
            core.setOutput('pr_updated', 'false');
            core.setOutput('pr_url', newPR.html_url);
            core.setOutput('pr_number', newPR.number);
          }

    - name: Send notification email
      if: always() && (steps.create_pr.outputs.pr_created == 'true' || steps.create_pr.outputs.pr_updated == 'true')
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: |
          ${{ steps.create_pr.outputs.pr_created == 'true' && '🆕 New' || '🔄 Updated' }} PR Ready: ${{ github.ref_name }} → development
        to: ${{ secrets.TEAM_LEAD_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Hi Team Lead! 👋

          ${{ steps.create_pr.outputs.pr_created == 'true' && 'A new Pull Request has been created' || 'An existing Pull Request has been updated' }} and is ready for review.

          ## 📋 PR Details
          **Branch:** `${{ github.ref_name }}` → `development`  
          **Repository:** ${{ github.repository }}  
          **Author:** @${{ github.actor }}  
          **PR Link:** ${{ steps.create_pr.outputs.pr_url }}

          ## ✅ Quality Status
          - ✅ Flutter analyze: Passed
          - ✅ Tests: Passed
          - ✅ APK build: Successful
          - ✅ Screenshots: Captured

          ## 📱 Screenshots Available
          App screenshots have been automatically captured and are available as workflow artifacts.
          **Download:** [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ## 🎯 Next Steps
          Please review the PR and approve/request changes: ${{ steps.create_pr.outputs.pr_url }}

          ---
          *Automated by GitHub Actions*  
          Best regards, Ahmed Gad


















name: Create PR to Development

on:
  push:
    branches:
      - 'features/*'  # Triggers on any branch starting with 'features/'
      - 'bugfix/*'    # Triggers on any branch starting with 'bugfix/'
      - 'hotfix/*'    # Triggers on any branch starting with 'hotfix/' 
  
permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK for screenshots
      run: flutter build apk --debug --flavor development --target lib/main_development.dart

    - name: Install and run app for screenshots
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          set -e
          echo "Emulator started, installing APK..."
          
          # List available APKs to debug path issues
          find build/app/outputs -name "*.apk" -type f
          
          # Find the correct APK file
          if [ -f "build/app/outputs/flutter-apk/app-development-debug.apk" ]; then
            APK_FILE="build/app/outputs/flutter-apk/app-development-debug.apk"
            echo "Using flutter-apk path: $APK_FILE"
          elif [ -f "build/app/outputs/apk/development/debug/app-development-debug.apk" ]; then
            APK_FILE="build/app/outputs/apk/development/debug/app-development-debug.apk"
            echo "Using apk/development/debug path: $APK_FILE"
          else
            APK_FILE=$(find build/app/outputs -name "*.apk" -type f | head -1)
            if [ -n "$APK_FILE" ]; then
              echo "Using first found APK: $APK_FILE"
            else
              echo "No APK found!"
              exit 1
            fi
          fi
          
          # Install the APK
          echo "Installing APK: $APK_FILE"
          adb install "$APK_FILE"
          
          # Get package name from pubspec.yaml
          PACKAGE_NAME=$(grep "^name:" pubspec.yaml | cut -d' ' -f2 | tr -d '\r')
          echo "Package name: $PACKAGE_NAME"
          
          # Wait for device to be ready
          adb wait-for-device
          sleep 5
          
          # Launch the app
          echo "Launching app..."
          adb shell am start -n ${PACKAGE_NAME}/.MainActivity
          
          # Wait for app to fully load
          echo "Waiting for app to load..."
          sleep 15
          
          # Create screenshots directory
          mkdir -p screenshots
          
          # Take initial screenshot
          echo "Taking screenshot 1..."
          adb exec-out screencap -p > screenshots/screenshot_1.png
          
          # Wait and take another screenshot
          sleep 5
          echo "Taking screenshot 2..."
          adb exec-out screencap -p > screenshots/screenshot_2.png
          
          # Optional: Add more interactions and screenshots
          # Example: Swipe or tap to navigate
          # adb shell input swipe 500 1500 500 500 1000
          # sleep 3
          # adb exec-out screencap -p > screenshots/screenshot_3.png
          
          echo "Screenshots captured successfully"
          ls -la screenshots/

    - name: Upload screenshots as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-screenshots-${{ github.run_id }}-${{ github.run_attempt }}
        path: screenshots/
        retention-days: 30

    - name: Create Pull Request
      id: create_pr
      uses: actions/github-script@v7
      with:
        script: |
          try {
            // Extract branch name from the ref (removes 'refs/heads/')
            const headBranch = context.ref.replace('refs/heads/', '');
            console.log('Creating PR for:', headBranch, '-> development');
            
            // Check if PR already exists
            const existingPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${headBranch}`,
              base: 'development',
              state: 'open'
            });
            
            if (existingPRs.data.length > 0) {
              console.log('PR already exists:', existingPRs.data[0].html_url);
              core.setOutput('pr_created', 'false');
              core.setOutput('pr_url', existingPRs.data[0].html_url);
              core.setOutput('pr_number', existingPRs.data[0].number);
              return;
            }
            
            // Get workflow run URL for screenshots
            const workflowUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            
            // Create new PR with screenshots reference
            const result = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 ${headBranch} → development`,
              head: headBranch,
              base: 'development',
              body: `## Automated Pull Request
              
            **Branch:** ${headBranch} → development
            **Author:** ${context.actor}
            **Triggered by:** Push to ${headBranch}

            This PR was automatically created when changes were pushed to the ${headBranch} branch.

            ## 📱 Screenshots
            Screenshots of the app have been captured and are available in the workflow artifacts:
            [View Screenshots](${workflowUrl}) - Download the \`app-screenshots-${context.runId}-${context.runNumber}\` artifact

            ## ✅ Quality Checks
            - Flutter analyze: Passed
            - Tests: Passed
            - Screenshots: Captured

            Please review the changes and merge when ready.`
                        });
                        
                        console.log('PR created successfully:', result.data.html_url);
                        core.setOutput('pr_created', 'true');
                        core.setOutput('pr_url', result.data.html_url);
                        core.setOutput('pr_number', result.data.number);
                        
                      } catch (error) {
                        console.error('Error creating PR:', error);
                        core.setFailed(`Failed to create PR: ${error.message}`);
                      }

    - name: Send email notification
      if: steps.create_pr.outputs.pr_created == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com 
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "📋 New PR for Review: ${{ github.ref_name }} → development"
        to: ${{ secrets.TEAM_LEAD_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Hi Team Lead,
          
          A new Pull Request has been created and is ready for your review.
          
          **Pull Request Details:**
          - Branch: ${{ github.ref_name }}
          - Repository: ${{ github.repository }}
          - Author: ${{ github.actor }}
          - PR URL: ${{ steps.create_pr.outputs.pr_url }}
          
          **Quality Checks:**
          ✅ Flutter analyze passed
          ✅ Tests passed
          ✅ Screenshots captured
          ⏳ Awaiting your code review
          
          **Screenshots:**
          App screenshots have been captured and are available as workflow artifacts.
          View them at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          **Action Required:**
          Please review the PR and approve/request changes:
          ${{ steps.create_pr.outputs.pr_url }}
          
          **Workflow Details:**
          View workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Best regards,
          Ahmed Gad

    - name: Send email if PR already exists
      if: steps.create_pr.outputs.pr_created == 'false' && steps.create_pr.outputs.pr_url
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com 
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🔄 PR Updated: ${{ github.ref_name }} → development"
        to: ${{ secrets.TEAM_LEAD_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Hi Team Lead,
          
          An existing Pull Request has been updated with new changes.
          
          **Pull Request Details:**
          - Branch: ${{ github.ref_name }}
          - Repository: ${{ github.repository }}
          - Author: ${{ github.actor }}
          - PR URL: ${{ steps.create_pr.outputs.pr_url }}
          
          **Latest Changes:**
          New commits have been pushed to the feature branch. Please review the updated changes.
          
          **Screenshots:**
          Updated screenshots are available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Best regards,
          Ahmed Gad





















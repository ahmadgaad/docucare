name: Create PR to Development

on:
  push:
    branches:
      - 'features/*'
      - 'bugfix/*'
      - 'hotfix/*'
  
permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.0'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Run Flutter analyze
      run: flutter analyze

    - name: Run tests
      run: flutter test

    - name: Build APK for testing
      run: flutter build apk --debug --flavor development --target lib/main_development.dart

    - name: Create screenshot script
      run: |
        cat > screenshot.sh << 'EOF'
        #!/bin/bash
        set -e
        echo "🚀 Starting screenshot capture process..."
        mkdir -p screenshots
        
        # Find and install APK
        APK_FILE=$(find build/app/outputs -name "*.apk" -type f | head -1)
        if [ -z "$APK_FILE" ]; then
          echo "❌ No APK found!"
          exit 1
        fi
        
        echo "📦 Installing APK: $APK_FILE"
        adb install "$APK_FILE"
        
        # Get the actual package name from the APK
        PACKAGE_NAME=$(aapt dump badging "$APK_FILE" | grep package | awk -v FS="'" '/package:/{print $2}')
        echo "📱 Detected package name: $PACKAGE_NAME"
        
        # Alternative method if aapt fails
        if [ -z "$PACKAGE_NAME" ]; then
          PACKAGE_NAME=$(adb shell pm list packages | grep -E "(com\.|org\.|dev\.)" | tail -1 | cut -d: -f2)
          echo "📱 Fallback package name: $PACKAGE_NAME"
        fi
        
        # Wait for device to be fully ready
        echo "⏳ Waiting for device to be ready..."
        adb wait-for-device
        sleep 5
        
        # Launch the app with multiple attempts
        echo "🔥 Launching app: $PACKAGE_NAME"
        
        # Method 1: Try with .MainActivity
        adb shell am start -n "${PACKAGE_NAME}/.MainActivity" || \
        # Method 2: Try with full path
        adb shell am start -n "${PACKAGE_NAME}/com.example.myapp.MainActivity" || \
        # Method 3: Try launching the main activity
        adb shell monkey -p "$PACKAGE_NAME" -c android.intent.category.LAUNCHER 1 || \
        # Method 4: Force start
        adb shell am start -a android.intent.action.MAIN -c android.intent.category.LAUNCHER -n "${PACKAGE_NAME}/.MainActivity"
        
        # Wait longer for app to fully load
        echo "⏳ Waiting for app to load..."
        sleep 15
        
        # Check if app is running
        adb shell "ps | grep $PACKAGE_NAME" || adb shell "ps -ef | grep $PACKAGE_NAME"
        
        # Take screenshots with longer intervals
        echo "📸 Taking screenshot 1 (App Launch)..."
        adb exec-out screencap -p > screenshots/screenshot_1.png
        
        # Light interaction
        echo "🖱️ Tapping screen..."
        adb shell input tap 720 1280  # Center of typical phone screen
        sleep 5
        
        echo "📸 Taking screenshot 2 (After tap)..."
        adb exec-out screencap -p > screenshots/screenshot_2.png
        
        # Scroll or swipe
        echo "📱 Performing swipe gesture..."
        adb shell input swipe 360 1800 360 800 1000  # Vertical swipe
        sleep 5
        
        echo "📸 Taking screenshot 3 (After swipe)..."
        adb exec-out screencap -p > screenshots/screenshot_3.png
        
        # Additional screenshot after back to home
        echo "🏠 Checking current activity..."
        adb shell dumpsys window windows | grep -E 'mCurrentFocus|mFocusedApp'
        
        echo "📸 Taking screenshot 4 (Current state)..."
        adb exec-out screencap -p > screenshots/screenshot_4.png
        
        echo "✅ Screenshots captured successfully"
        ls -la screenshots/
        
        # Debug: Show what apps are currently running
        echo "🔍 Currently running apps:"
        adb shell "ps | grep -v kernel" || adb shell "ps -ef | head -20"
        EOF
        chmod +x screenshot.sh

    - name: Capture app screenshots
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: ./screenshot.sh

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()  # Upload even if previous steps failed
      with:
        name: app-screenshots-${{ github.sha }}
        path: screenshots/
        retention-days: 30

    - name: Create or update Pull Request
      id: create_pr
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const headBranch = context.ref.replace('refs/heads/', '');
          const baseBranch = 'development';
          
          console.log(`🔍 Checking for existing PR: ${headBranch} → ${baseBranch}`);
          
          // Check for existing PR
          const { data: existingPRs } = await github.rest.pulls.list({
            owner,
            repo,
            head: `${owner}:${headBranch}`,
            base: baseBranch,
            state: 'open'
          });
          
          const workflowUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
          const screenshotArtifact = `app-screenshots-${context.sha}`;
          
          const prBody = `## 🔄 Automated Pull Request

          **Branch:** \`${headBranch}\` → \`${baseBranch}\`  
          **Author:** @${context.actor}  
          **Triggered by:** Push to ${headBranch}

          ### 📱 App Screenshots
          Screenshots have been automatically captured and are available as workflow artifacts:
          - **Artifact Name:** \`${screenshotArtifact}\`
          - **Download Link:** [View Workflow Run](${workflowUrl})

          ### ✅ Automated Checks
          - ✅ Flutter analyze passed
          - ✅ Tests passed  
          - ✅ APK build successful
          - ✅ Screenshots captured

          *This PR was automatically created. Please review and merge when ready.*`;

          if (existingPRs.length > 0) {
            // Update existing PR
            const pr = existingPRs[0];
            console.log(`📝 Updating existing PR #${pr.number}`);
            
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: prBody
            });
            
            core.setOutput('pr_created', 'false');
            core.setOutput('pr_updated', 'true');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_number', pr.number);
          } else {
            // Create new PR
            console.log(`✨ Creating new PR: ${headBranch} → ${baseBranch}`);
            
            const { data: newPR } = await github.rest.pulls.create({
              owner,
              repo,
              title: `🚀 ${headBranch} → ${baseBranch}`,
              head: headBranch,
              base: baseBranch,
              body: prBody
            });
            
            console.log(`🎉 PR created: ${newPR.html_url}`);
            core.setOutput('pr_created', 'true');
            core.setOutput('pr_updated', 'false');
            core.setOutput('pr_url', newPR.html_url);
            core.setOutput('pr_number', newPR.number);
          }

    - name: Send notification email
      if: always() && (steps.create_pr.outputs.pr_created == 'true' || steps.create_pr.outputs.pr_updated == 'true')
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: |
          ${{ steps.create_pr.outputs.pr_created == 'true' && '🆕 New' || '🔄 Updated' }} PR Ready: ${{ github.ref_name }} → development
        to: ${{ secrets.TEAM_LEAD_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Hi Team Lead! 👋

          ${{ steps.create_pr.outputs.pr_created == 'true' && 'A new Pull Request has been created' || 'An existing Pull Request has been updated' }} and is ready for review.

          ## 📋 PR Details
          **Branch:** `${{ github.ref_name }}` → `development`  
          **Repository:** ${{ github.repository }}  
          **Author:** @${{ github.actor }}  
          **PR Link:** ${{ steps.create_pr.outputs.pr_url }}

          ## ✅ Quality Status
          - ✅ Flutter analyze: Passed
          - ✅ Tests: Passed
          - ✅ APK build: Successful
          - ✅ Screenshots: Captured

          ## 📱 Screenshots Available
          App screenshots have been automatically captured and are available as workflow artifacts.
          **Download:** [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ## 🎯 Next Steps
          Please review the PR and approve/request changes: ${{ steps.create_pr.outputs.pr_url }}

          ---
          *Automated by GitHub Actions*  
          Best regards, Ahmed Gad














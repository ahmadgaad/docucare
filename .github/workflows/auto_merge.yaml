name: Auto-merge Feature to Development

on:
  push:
    branches:
      - 'features/*'  # Triggers on any branch starting with 'feature/'
      - 'bugfix/*'    # Triggers on any branch starting with 'bugfix/'
      - 'hotfix/*'     # Triggers on any branch starting with 'hotfix/' 
  
permissions:
  contents: write
  actions: read

jobs:
  auto-merge-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure Git
      run: |
        git config --local user.email "softagi.tech@gmail.com"
        git config --local user.name "ahmadgaad"
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
    
    - name: Get dependencies
      run: flutter pub get

    - name: Merge to development via GitHub API
      id: merge
      uses: actions/github-script@v7
      with:
        script: |
          try {
            // Extract branch name from the ref (removes 'refs/heads/')
            const headBranch = context.ref.replace('refs/heads/', '');
            console.log('Attempting to merge:', headBranch, '-> development');
            
            const result = await github.rest.repos.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'development',
              head: headBranch,
              commit_message: `Auto-merge: ${headBranch} into development`
            });
            
            console.log('Merge successful:', result.data.sha);
            core.setOutput('merge_success', 'true');
            core.setOutput('merge_sha', result.data.sha);
          } catch (error) {
            console.log('Merge failed:', error.message);
            console.log('Context ref:', context.ref);
            console.log('Context ref_name:', context.ref_name);
            core.setOutput('merge_success', 'false');
            core.setFailed(`Merge failed: ${error.message}`);
          }

    # - name: Merge to development branch

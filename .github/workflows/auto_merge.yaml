    #       echo "merge_success=true" >> $GITHUB_OUTPUT
    #       echo "Merge successful, pushing to origin..."
    #       git push origin development
    #     else
    #       echo "merge_success=false" >> $GITHUB_OUTPUT
    #       echo "Merge failed due to conflicts"
    #       exit 1
    #     fi
    
    - name: Send email notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com 
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ Auto-merge Successful: ${{ github.ref_name }} → development"
        to: ${{ secrets.TEAM_LEAD_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Hi Team Lead,
          
          A new feature branch has been automatically merged to the development branch and requires your code review.
          
          Branch Details:
          - Feature Branch: ${{ github.ref_name }}
          - Repository: ${{ github.repository }}
          - Commit: ${{ github.sha }}
          - Author: ${{ github.actor }}
          - Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Please review the changes at:
          ${{ github.server_url }}/${{ github.repository }}/compare/development...${{ github.ref_name }}
          
          Best regards,
          Ahmed Gad